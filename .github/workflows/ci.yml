name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build coolhand-node from source
        if: ${{ !hashFiles('node_modules/coolhand-node/dist/index.js') }}
        run: |
          git clone --depth 1 --branch mikecarroll/fix-parse-json-array https://github.com/Coolhand-Labs/coolhand-node.git /tmp/coolhand-node-src
          cd /tmp/coolhand-node-src
          npm ci
          npm run build
          mkdir -p $GITHUB_WORKSPACE/node_modules/coolhand-node/dist
          cp -r dist/* $GITHUB_WORKSPACE/node_modules/coolhand-node/dist/

      - name: Run tests
        run: npm test

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build coolhand-node from source
        if: ${{ !hashFiles('node_modules/coolhand-node/dist/index.js') }}
        run: |
          git clone --depth 1 --branch mikecarroll/fix-parse-json-array https://github.com/Coolhand-Labs/coolhand-node.git /tmp/coolhand-node-src
          cd /tmp/coolhand-node-src
          npm ci
          npm run build
          mkdir -p $GITHUB_WORKSPACE/node_modules/coolhand-node/dist
          cp -r dist/* $GITHUB_WORKSPACE/node_modules/coolhand-node/dist/

      - name: Run TypeScript type check
        run: npm run typecheck
